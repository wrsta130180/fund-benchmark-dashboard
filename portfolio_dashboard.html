<meta charset="utf-8">
<title>WRS Portfolio Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* ─────────────────────────  THEME  ───────────────────────── */
  :root{
    --navy:#0f1923; --navy-2:#13212f; --line:#1e2d3d;
    --ink:#0f1923; --ink-2:#1e2d3d; --muted:#64748b; --muted-2:#94a3b8;
    --bg:#eef2f6; --surface:#ffffff; --surface-2:#f8fafc; --border:#e2e8f0;
    --side-text:#c9d6df;
    --accent:#2f6df0; --accent-soft:#e8f0fe;
    --pos:#16a34a; --neg:#dc2626;
    --c1:#2f6df0; --c2:#16a34a; --c3:#9333ea; --c4:#ea580c; --c5:#0891b2; --c6:#ca8a04; --c7:#64748b;
    --shadow:0 1px 3px rgba(15,25,35,.08), 0 1px 2px rgba(15,25,35,.04);
    --shadow-lg:0 10px 30px rgba(15,25,35,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); font-size:14px; line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }
  .app{display:flex; min-height:100vh}

  /* ─────────────────────────  SIDEBAR  ───────────────────────── */
  .sidebar{
    width:248px; flex:0 0 248px; background:var(--navy); border-right:1px solid var(--line);
    display:flex; flex-direction:column; position:sticky; top:0; height:100vh;
  }
  .brand{padding:20px 20px 16px; border-bottom:1px solid var(--line)}
  .brand .logo{display:flex; align-items:center; gap:10px}
  .brand .mark{
    width:30px;height:30px;border-radius:7px;flex:0 0 30px;
    background:linear-gradient(135deg,#2f6df0,#1e40af);
    display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;letter-spacing:.02em;
  }
  .brand .name{color:#fff;font-weight:700;font-size:14px;letter-spacing:.04em}
  .brand .sub{color:var(--muted-2);font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin-top:2px}

  .nav{padding:12px 10px; flex:1 1 auto; overflow-y:auto}
  .nav-label{color:#5b6b7a;font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:10px 12px 6px}
  .nav-item{
    display:flex;align-items:center;gap:11px;width:100%;border:0;background:transparent;cursor:pointer;
    color:var(--side-text);font-size:13.5px;text-align:left;padding:9px 12px;border-radius:8px;margin:1px 0;
    font-family:inherit;transition:background .12s,color .12s;
  }
  .nav-item:hover{background:var(--navy-2);color:#fff}
  .nav-item.active{background:#1b2c3e;color:#fff;font-weight:600}
  .nav-item.active .ico{color:var(--accent)}
  .nav-item .ico{flex:0 0 18px;color:#7c8da0;display:flex}
  .nav-item .ct{margin-left:auto;font-size:11px;color:var(--muted-2);background:#16242f;border-radius:10px;padding:1px 8px;min-width:22px;text-align:center}
  .nav-item.active .ct{background:#22384c;color:#cfe0f5}

  .side-foot{padding:12px 14px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:7px}
  .side-foot .sbtn{
    display:flex;align-items:center;gap:8px;justify-content:center;
    background:transparent;border:1px solid #28384a;color:var(--side-text);
    border-radius:7px;padding:7px;font-size:12px;cursor:pointer;font-family:inherit;transition:.12s;
  }
  .side-foot .sbtn:hover{background:var(--navy-2);border-color:#3a4d63;color:#fff}
  .side-foot .meta{color:#52647a;font-size:10.5px;text-align:center;margin-top:2px}

  /* ─────────────────────────  MAIN  ───────────────────────── */
  .main{flex:1 1 auto; min-width:0; display:flex; flex-direction:column}
  .topbar{
    background:var(--surface);border-bottom:1px solid var(--border);
    padding:16px 30px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20;
  }
  .topbar h1{margin:0;font-size:20px;font-weight:700;letter-spacing:.01em}
  .topbar .crumb{color:var(--muted);font-size:12px;margin-top:2px;letter-spacing:.02em}
  .topbar .spacer{flex:1}
  .topbar .date{color:var(--muted);font-size:12.5px;text-align:right}
  .topbar .date b{color:var(--ink);display:block;font-size:13px}

  .content{padding:26px 30px 48px; max-width:1320px; width:100%}

  /* KPI cards */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
  @media(max-width:1080px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:16px 18px;box-shadow:var(--shadow)}
  .kpi .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:7px}
  .kpi .lab .dot{width:8px;height:8px;border-radius:3px;display:inline-block}
  .kpi .val{font-size:26px;font-weight:800;margin-top:9px;letter-spacing:-.01em}
  .kpi .hint{font-size:11.5px;color:var(--muted-2);margin-top:4px}

  /* generic card */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
  .card .hd{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
  .card .hd h2{margin:0;font-size:14px;font-weight:700;letter-spacing:.01em}
  .card .hd .desc{font-size:11.5px;color:var(--muted-2)}
  .card .hd .spacer{flex:1}
  .card .bd{padding:20px}

  .grid-2{display:grid;grid-template-columns:1.15fr 1fr;gap:18px;margin-bottom:22px}
  @media(max-width:980px){.grid-2{grid-template-columns:1fr}}
  .grid-2b{display:grid;grid-template-columns:1fr 1.4fr;gap:18px;margin-bottom:22px}
  @media(max-width:980px){.grid-2b{grid-template-columns:1fr}}

  /* donut */
  .donut-wrap{display:flex;align-items:center;gap:26px;flex-wrap:wrap;justify-content:center}
  .donut{position:relative;width:188px;height:188px;flex:0 0 188px}
  .donut .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .donut .center .t{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .donut .center .v{font-size:21px;font-weight:800;margin-top:2px}
  .legend{display:flex;flex-direction:column;gap:9px;min-width:200px}
  .legend .row{display:flex;align-items:center;gap:10px;font-size:13px}
  .legend .row .sw{width:11px;height:11px;border-radius:3px;flex:0 0 11px}
  .legend .row .nm{color:var(--ink-2)}
  .legend .row .vv{margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums}
  .legend .row .pc{color:var(--muted-2);font-size:11.5px;width:42px;text-align:right;font-variant-numeric:tabular-nums}

  /* horizontal bars */
  .bars{display:flex;flex-direction:column;gap:14px}
  .bar-row .top{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px}
  .bar-row .top .nm{color:var(--ink-2);font-weight:600}
  .bar-row .top .vv{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}
  .bar-track{height:9px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;overflow:hidden}
  .bar-fill{height:100%;border-radius:6px 0 0 6px;transition:width .5s ease}

  /* table */
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{
    text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
    font-weight:700;padding:11px 20px;border-bottom:1px solid var(--border);background:var(--surface-2);
  }
  thead th.num,td.num{text-align:right;font-variant-numeric:tabular-nums}
  tbody td{padding:13px 20px;border-bottom:1px solid #eef2f6;vertical-align:middle}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover{background:#fafcff}
  td .mgr{font-weight:600;color:var(--ink)}
  td .net{font-weight:700}
  .row-act{display:flex;gap:6px;justify-content:flex-end;opacity:0;transition:opacity .12s}
  tbody tr:hover .row-act{opacity:1}
  .icobtn{border:1px solid var(--border);background:var(--surface);border-radius:6px;width:30px;height:30px;cursor:pointer;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;transition:.12s}
  .icobtn:hover{color:var(--ink);border-color:var(--muted-2)}
  .icobtn.danger:hover{color:var(--neg);border-color:#fca5a5;background:#fef2f2}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border);background:var(--surface);color:var(--ink);
    border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.12s}
  .btn:hover{background:var(--surface-2);border-color:var(--muted-2)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(47,109,240,.3)}
  .btn.primary:hover{background:#255cd6;border-color:#255cd6}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
  .btn.ghost:hover{color:var(--ink);background:var(--surface-2)}

  /* empty state */
  .empty{text-align:center;padding:54px 20px;color:var(--muted)}
  .empty .ei{width:54px;height:54px;border-radius:14px;background:var(--surface-2);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--muted-2)}
  .empty h3{margin:0 0 4px;font-size:15px;color:var(--ink)}
  .empty p{margin:0 0 16px;font-size:13px}

  /* placeholder feeds */
  .feed-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #eef2f6}
  .feed-item:last-child{border-bottom:0}
  .feed-item .tag{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);border-radius:5px;padding:2px 7px;height:fit-content;white-space:nowrap}
  .feed-item .ft{font-size:13px;color:var(--ink-2);font-weight:500;display:block}
  a.ft{text-decoration:none;transition:color .12s}
  a.ft:hover{color:var(--accent)}
  .feed-item .fm{font-size:11.5px;color:var(--muted-2);margin-top:2px}
  .ph-note{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted-2);background:var(--surface-2);border:1px dashed var(--border);border-radius:8px;padding:8px 12px;margin-top:14px}

  .mkt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  @media(max-width:760px){.mkt-grid{grid-template-columns:repeat(2,1fr)}}
  .mkt{background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:12px 14px}
  .mkt .nm{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .mkt .pv{font-size:18px;font-weight:800;margin-top:6px;color:var(--muted-2)}
  .mkt .ch{font-size:11.5px;color:var(--muted-2);margin-top:2px}

  .pill{font-size:11px;font-weight:700;color:#fff;border-radius:20px;padding:3px 11px;letter-spacing:.02em}

  /* ─────────────────────────  MODAL  ───────────────────────── */
  .overlay{position:fixed;inset:0;background:rgba(15,25,35,.55);backdrop-filter:blur(2px);
    display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:14px;width:100%;max-width:460px;box-shadow:var(--shadow-lg);overflow:hidden;animation:pop .16s ease}
  @keyframes pop{from{transform:translateY(8px) scale(.98);opacity:0}to{transform:none;opacity:1}}
  .modal .mh{padding:20px 22px 0}
  .modal .mh .eye{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:700}
  .modal .mh h3{margin:5px 0 2px;font-size:17px;font-weight:700}
  .modal .mh p{margin:0;font-size:12.5px;color:var(--muted)}
  .modal .mb{padding:18px 22px}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
  .field label .req{color:var(--neg);margin-left:2px}
  .field input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;color:var(--ink);transition:.12s;background:var(--surface)}
  .field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .field input.money-input{padding-left:26px;padding-right:30px}
  .money-wrap{position:relative}
  .money-wrap .dollar{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
  .money-wrap .suffix{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;font-weight:600;pointer-events:none}
  .field label .unit{color:var(--muted-2);font-weight:500;font-size:11px;letter-spacing:0}
  .field .hint{font-size:11px;color:var(--muted-2);margin-top:5px}
  .field .err{display:none;color:var(--neg);font-size:11.5px;margin-top:5px}
  .field.invalid input{border-color:var(--neg)}
  .field.invalid .err{display:block}
  .modal .mf{padding:14px 22px 20px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border);background:var(--surface-2)}

  /* ─────────────────────────  DRAG & DROP IMPORT  ───────────────────────── */
  .dropzone{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;
    background:rgba(15,25,35,.72);backdrop-filter:blur(3px);pointer-events:none}
  .dropzone.show{display:flex}
  .dz-box{border:2px dashed #4d7fe0;border-radius:18px;background:rgba(47,109,240,.06);
    padding:46px 60px;text-align:center;color:#fff;animation:pop .14s ease}
  .dz-ico{width:60px;height:60px;border-radius:16px;margin:0 auto 16px;background:var(--accent);
    display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(47,109,240,.5)}
  .dz-t{font-size:22px;font-weight:800;letter-spacing:.01em}
  .dz-s{font-size:13.5px;color:#c9d6df;margin-top:6px}
  .dz-s b{color:#fff}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;
    padding:11px 20px;border-radius:10px;font-size:13px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;z-index:200;display:flex;align-items:center;gap:9px}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast .tk{color:#4ade80;display:flex}
</style>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">
        <div class="mark">WRS</div>
        <div>
          <div class="name">Portfolio Dashboard</div>
          <div class="sub">Wyoming Retirement</div>
        </div>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">
      <button class="sbtn" onclick="exportData()">⬇ Export data</button>
      <button class="sbtn" onclick="document.getElementById('importFile').click()" title="Click to browse, or drag a .json file anywhere onto the window">⬆ Import data <span style="color:#52647a;font-size:10px">· or drag &amp; drop</span></button>
      <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
      <button class="sbtn" onclick="resetToBaseline()" title="Restore the baseline fund data embedded in this file">↺ Reset to baseline</button>
      <div class="meta" id="footMeta"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div>
        <h1 id="pageTitle">Overview</h1>
        <div class="crumb" id="pageCrumb">Total portfolio</div>
      </div>
      <div class="spacer"></div>
      <div class="date">
        <span>As of</span>
        <b id="todayDate"></b>
      </div>
    </header>
    <main class="content" id="content"></main>
  </div>
</div>

<!-- ADD / EDIT MANAGER MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <form id="mgrForm" onsubmit="submitModal(event)">
      <div class="mh">
        <div class="eye" id="modalEye">Add manager</div>
        <h3 id="modalTitle">Add Manager</h3>
        <p id="modalSub"></p>
      </div>
      <div class="mb">
        <div class="field" id="f_manager">
          <label>Manager Name <span class="req">*</span></label>
          <input id="in_manager" autocomplete="off" placeholder="e.g. Bridgewater Associates">
          <div class="err">Manager name is required.</div>
        </div>
        <div class="field" id="f_net">
          <label>Current WRS Value <span class="req">*</span> <span class="unit">in $ millions</span></label>
          <div class="money-wrap">
            <span class="dollar">$</span>
            <input id="in_net" class="money-input" inputmode="decimal" autocomplete="off" placeholder="250.5">
            <span class="suffix">M</span>
          </div>
          <div class="hint">Enter the value in millions — e.g. 250.5 means $250.5M.</div>
          <div class="err">Enter a valid amount (in millions).</div>
        </div>
      </div>
      <div class="mf">
        <button type="button" class="btn ghost" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn primary" id="modalSave">Add Manager</button>
      </div>
    </form>
  </div>
</div>

<!-- DRAG & DROP IMPORT OVERLAY -->
<div class="dropzone" id="dropzone">
  <div class="dz-box">
    <div class="dz-ico"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
    <div class="dz-t">Drop to import</div>
    <div class="dz-s">Release your <b>.json</b> data file to load it</div>
  </div>
</div>

<div class="toast" id="toast"><span class="tk">✓</span><span id="toastMsg"></span></div>

     1) defaults to null (placeholders shown)
     2) local snapshot file written by the Streamlit app (works from file://)
     3) fresh data injected by the Streamlit wrapper at the marker below -->
<script>window.WRS_MARKET = window.WRS_MARKET || null;</script>
<script src="market_snapshot.js"></script>

  other:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>',
};
const STORAGE_KEY = 'wrs_portfolio_dashboard_v1';
const SEED_VERSION_KEY = 'wrs_portfolio_seed_ver';

/* ══════════════════  BASELINE (EMBEDDED) FUND DATA  ══════════════════
   This is the DURABLE source of truth. It lives in this file, so the funds
   survive cleared browsers, new machines, the Streamlit version, and any
   edits we make to the dashboard. localStorage is only a live working copy
   seeded from here.

   • To load/update the baseline: edit SEED_DATA below and bump SEED_VERSION.
   • On next load, each browser reconciles the new baseline into its working
     copy (new funds are added; the user's own in-browser additions are kept).
   • "Reset to baseline" in the sidebar restores exactly this data on demand.
*/
const SEED_VERSION = 0;            // 0 = no baseline funds loaded yet — bump to 1 when data is added
const SEED_DATA = { managers: {
  marketable_alternatives:    [],
  equities:                   [],
  fixed_income:               [],
  private_equity_real_assets: [],
  private_credit:             [],
  cash:                       [],
  other:                      []
}};

/* ════════════════════════════  STATE  ════════════════════════════ */
let state = loadState();
let currentPage = 'overview';
let editing = { classId:null, id:null };

function blankState(){
  const m = {};
  ASSET_CLASSES.forEach(c => m[c.id] = []);
  return { managers:m };
}
/* Coerce any {managers:{...}} shape into a clean, id-stamped state. */
function normalizeState(s){
  const base = blankState();
  if(s && s.managers){
    ASSET_CLASSES.forEach(c => {
      if(Array.isArray(s.managers[c.id])){
        base.managers[c.id] = s.managers[c.id].map(m => ({
          id: m.id || uid(),
          manager: String(m.manager || ''),
          net: Number(m.net) || 0
        }));
      }
    });
  }
  return base;
}
function mgrKey(m){ return (m.manager||'').trim().toLowerCase(); }

/* Baseline wins on conflicts; keep any extra funds the user added in-browser. */
function reconcileWithSeed(stored){
  const base = normalizeState(SEED_DATA);
  ASSET_CLASSES.forEach(c => {
    const seen = new Set(base.managers[c.id].map(mgrKey));
    (stored.managers[c.id] || []).forEach(m => {
      if(!seen.has(mgrKey(m))){ base.managers[c.id].push(m); seen.add(mgrKey(m)); }
    });
  });
  return base;
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    const storedVer = localStorage.getItem(SEED_VERSION_KEY);
    if(!raw){
      // fresh browser → start from the embedded baseline
      const seeded = normalizeState(SEED_DATA);
      persist(seeded);
      return seeded;
    }
    let stored = normalizeState(JSON.parse(raw));
    if(String(storedVer) !== String(SEED_VERSION)){
      // baseline changed since this browser last synced → fold new funds in
      stored = reconcileWithSeed(stored);
      persist(stored);
    }
    return stored;
  }catch(e){ return normalizeState(SEED_DATA); }
}
function persist(s){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
    localStorage.setItem(SEED_VERSION_KEY, String(SEED_VERSION));
  }catch(e){}
}
function saveState(){
  persist(state);
  renderFootMeta();
}
/* Restore exactly the embedded baseline (used by the sidebar button). */
function resetToBaseline(){
  if(!confirm('Reset to the baseline fund data embedded in this file?\nYour in-browser changes will be replaced.')) return;
  state = normalizeState(SEED_DATA);
  saveState(); go(currentPage); toast('Reset to baseline data');
}
function uid(){ return 'm_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-3); }

/* ════════════════════════════  HELPERS  ════════════════════════════ */
function classById(id){ return ASSET_CLASSES.find(c => c.id === id); }
function listFor(id){ return state.managers[id] || []; }
function totalFor(id){ return listFor(id).reduce((s,m) => s + (Number(m.net)||0), 0); }
function grandTotal(){ return ASSET_CLASSES.reduce((s,c) => s + totalFor(c.id), 0); }
function totalManagers(){ return ASSET_CLASSES.reduce((s,c) => s + listFor(c.id).length, 0); }

function fmtFull(n){
  n = Number(n)||0;
  return (n<0?'-$':'$') + Math.abs(n).toLocaleString('en-US',{maximumFractionDigits:0});
}
/* Per-fund display: always in $ millions, e.g. 250500000 -> "$250.5M" */
function fmtM(n){
  n = Number(n)||0; const m = Math.abs(n)/1e6;
  return (n<0?'-$':'$') + m.toLocaleString('en-US',{maximumFractionDigits:1}) + 'M';
}
function fmtCompact(n){
  n = Number(n)||0; const a = Math.abs(n); const sign = n<0?'-':'';
  if(a >= 1e9) return sign+'$'+(a/1e9).toFixed(2).replace(/\.?0+$/,'')+'B';
  if(a >= 1e6) return sign+'$'+(a/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';
  if(a >= 1e3) return sign+'$'+(a/1e3).toFixed(1).replace(/\.?0+$/,'')+'K';
  return sign+'$'+a.toLocaleString('en-US',{maximumFractionDigits:0});
}
function pct(part, whole){ return whole>0 ? (part/whole*100) : 0; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ════════════════════════════  SIDEBAR  ════════════════════════════ */
function renderNav(){
  const nav = document.getElementById('nav');
  let html = `<div class="nav-label">Dashboard</div>`;
  html += navItem({id:'overview', name:'Overview'}, ICONS.overview, false);
  html += `<div class="nav-label" style="margin-top:6px">Asset Classes</div>`;
  ASSET_CLASSES.forEach(c => { html += navItem(c, ICONS[c.id], true); });
  nav.innerHTML = html;
}
function navItem(c, icon, showCount){
  const active = currentPage === c.id ? ' active' : '';
  const count = showCount ? `<span class="ct">${listFor(c.id).length}</span>` : '';
  return `<button class="nav-item${active}" onclick="go('${c.id}')"><span class="ico">${icon}</span><span>${c.name}</span>${count}</button>`;
}
function renderFootMeta(){
  document.getElementById('footMeta').textContent =
    `${totalManagers()} managers · ${fmtCompact(grandTotal())}`;
}

/* ════════════════════════════  ROUTER  ════════════════════════════ */
function go(page){
  currentPage = page;
  renderNav();
  const title = page==='overview' ? 'Overview' : classById(page).name;
  document.getElementById('pageTitle').textContent = title;
  document.getElementById('pageCrumb').textContent =
    page==='overview' ? 'Total portfolio' : `Asset class · ${listFor(page).length} managers`;
  document.getElementById('content').innerHTML = page==='overview' ? renderOverview() : renderClass(page);
  document.getElementById('content').scrollTo?.(0,0);
  window.scrollTo(0,0);
}

/* ════════════════════════════  OVERVIEW  ════════════════════════════ */
function renderOverview(){
  const total = grandTotal();
  const segs = ASSET_CLASSES.map(c => ({ name:c.name, value:totalFor(c.id), hex:c.hex, id:c.id }))
                            .filter(s => s.value > 0).sort((a,b)=>b.value-a.value);
  const funded = segs.length;
  const top = segs[0];

  // KPI row
  let kpis = `<div class="kpis">
    ${kpi('Total WRS Value', fmtCompact(total), 'Across all asset classes', '#2f6df0')}
    ${kpi('Total Managers', String(totalManagers()), `${funded} of ${ASSET_CLASSES.length} classes funded`, '#16a34a')}
    ${kpi('Asset Classes', String(ASSET_CLASSES.length), 'Tracked categories', '#9333ea')}
    ${kpi('Largest Allocation', top?fmtCompact(top.value):'—', top?`${top.name} · ${pct(top.value,total).toFixed(1)}%`:'No data yet', '#ea580c')}
  </div>`;

  // Allocation donut + bar chart
  let charts = `<div class="grid-2">
    <div class="card">
      <div class="hd"><h2>Allocation by Asset Class</h2><div class="spacer"></div><span class="desc">By current WRS value</span></div>
      <div class="bd">${ total>0 ? donutBlock(segs, total) : miniEmpty('No allocations yet','Add managers to any asset class to populate this chart.') }</div>
    </div>
    <div class="card">
      <div class="hd"><h2>WRS Value by Class</h2></div>
      <div class="bd">${ total>0 ? barsBlock() : miniEmpty('Nothing to chart','Bars appear once values are recorded.') }</div>
    </div>
  </div>`;

  // Market snapshot + news (live when window.WRS_MARKET is present, else placeholders)
  let feeds = `<div class="grid-2b">${renderMarketSnapshot()}${renderNews()}</div>`;

  // All holdings table
  const all = [];
  ASSET_CLASSES.forEach(c => listFor(c.id).forEach(m => all.push({...m, className:c.name, hex:c.hex, classId:c.id})));
  all.sort((a,b)=>(Number(b.net)||0)-(Number(a.net)||0));
  let holdings = `<div class="card">
    <div class="hd"><h2>All Holdings</h2><div class="spacer"></div><span class="desc">${all.length} managers · sorted by value</span></div>
    ${ all.length ? `<table>
      <thead><tr><th>Manager</th><th>Asset Class</th><th class="num">Current WRS Value</th><th class="num">% of Total</th></tr></thead>
      <tbody>${ all.map(m => `<tr>
        <td><div class="mgr">${esc(m.manager)}</div></td>
        <td><span class="pill" style="background:${m.hex}">${esc(m.className)}</span></td>
        <td class="num net">${fmtM(m.net)}</td>
        <td class="num" style="color:var(--muted)">${pct(Number(m.net)||0,total).toFixed(1)}%</td>
      </tr>`).join('') }</tbody>
    </table>` : miniEmpty('No holdings yet','Use “Add Manager” on any asset-class page to get started.') }
  </div>`;

  return kpis + charts + feeds + holdings;
}

function kpi(lab,val,hint,dot){
  return `<div class="kpi"><div class="lab"><span class="dot" style="background:${dot}"></span>${lab}</div>
    <div class="val">${val}</div><div class="hint">${hint}</div></div>`;
}
/* ── Market Snapshot (driven by window.WRS_MARKET.tiles) ── */
function renderMarketSnapshot(){
  const d = window.WRS_MARKET;
  const tiles = (d && Array.isArray(d.tiles) && d.tiles.length) ? d.tiles : null;
  const live = tiles && tiles.some(t => t && t.value != null && t.value !== '');
  const desc = live ? ('Updated ' + esc(d.asOfLabel || '')) : 'Live feed not connected';
  const grid = (tiles || [{name:'S&P 500'},{name:'US 10Y'},{name:'US 2Y'},{name:'Fed Funds'}]).map(mktTile).join('');
  const note = live ? '' : `<div class="ph-note">ⓘ Not connected — run via Streamlit with free API keys (FRED / Finnhub). See <b>NEWS_SETUP.md</b>.</div>`;
  return `<div class="card">
    <div class="hd"><h2>Market Snapshot</h2><div class="spacer"></div><span class="desc">${desc}</span></div>
    <div class="bd"><div class="mkt-grid">${grid}</div>${note}</div>
  </div>`;
}
function mktTile(t){
  t = t || {};
  const has = t.value != null && t.value !== '';
  const col = t.dir==='up' ? 'var(--pos)' : t.dir==='down' ? 'var(--neg)' : 'var(--muted-2)';
  return `<div class="mkt"><div class="nm">${esc(t.name||'')}</div>
    <div class="pv"${has?' style="color:var(--ink)"':''}>${has?esc(t.value):'—'}</div>
    <div class="ch" style="color:${col}">${t.change ? esc(t.change) : (has?'':'awaiting feed')}</div></div>`;
}
/* ── News & Research (driven by window.WRS_MARKET.news) ── */
function renderNews(){
  const d = window.WRS_MARKET;
  const news = (d && Array.isArray(d.news) && d.news.length) ? d.news : null;
  const desc = news ? (news.length + ' headlines') : 'Feed not connected';
  const body = news
    ? news.slice(0,8).map(newsRow).join('')
    : feedItem('Feed','Headlines appear here once connected (Finnhub · SEC EDGAR · Fed RSS).') +
      feedItem('Setup','Add free API keys in Streamlit secrets — see NEWS_SETUP.md.');
  return `<div class="card">
    <div class="hd"><h2>News &amp; Research</h2><div class="spacer"></div><span class="desc">${desc}</span></div>
    <div class="bd">${body}</div>
  </div>`;
}
function newsRow(it){
  it = it || {};
  const title = it.url
    ? `<a class="ft" href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.title||'')}</a>`
    : `<div class="ft">${esc(it.title||'')}</div>`;
  const meta = [it.source, it.time].filter(Boolean).map(esc).join(' · ') || '—';
  return `<div class="feed-item"><span class="tag">${esc(it.tag||it.source||'News')}</span><div>${title}<div class="fm">${meta}</div></div></div>`;
}
function feedItem(tag,text){
  return `<div class="feed-item"><span class="tag">${esc(tag)}</span><div><div class="ft">${esc(text)}</div><div class="fm">—</div></div></div>`;
}
function miniEmpty(h,p){
  return `<div class="empty" style="padding:36px 16px"><h3>${h}</h3><p>${p}</p></div>`;
}

/* donut via SVG stroke-dasharray */
function donutBlock(segs, total){
  const R=70, C=2*Math.PI*R, cx=94, cy=94;
  let off=0, arcs='';
  segs.forEach(s => {
    const frac = s.value/total, len = frac*C;
    arcs += `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${s.hex}" stroke-width="22"
      stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}"
      transform="rotate(-90 ${cx} ${cy})"><title>${esc(s.name)}: ${fmtCompact(s.value)}</title></circle>`;
    off += len;
  });
  const legend = segs.map(s => `<div class="row">
      <span class="sw" style="background:${s.hex}"></span>
      <span class="nm">${esc(s.name)}</span>
      <span class="vv">${fmtCompact(s.value)}</span>
      <span class="pc">${pct(s.value,total).toFixed(1)}%</span>
    </div>`).join('');
  return `<div class="donut-wrap">
    <div class="donut">
      <svg width="188" height="188" viewBox="0 0 188 188">
        <circle cx="94" cy="94" r="70" fill="none" stroke="var(--surface-2)" stroke-width="22"/>
        ${arcs}
      </svg>
      <div class="center"><div class="t">Total</div><div class="v">${fmtCompact(total)}</div></div>
    </div>
    <div class="legend">${legend}</div>
  </div>`;
}

function barsBlock(){
  const data = ASSET_CLASSES.map(c => ({name:c.name, value:totalFor(c.id), hex:c.hex}));
  const max = Math.max(1, ...data.map(d=>Math.abs(d.value)));
  return `<div class="bars">${ data.map(d => `<div class="bar-row">
    <div class="top"><span class="nm">${esc(d.name)}</span><span class="vv">${fmtCompact(d.value)}</span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.max(0,Math.min(100,d.value/max*100)).toFixed(1)}%;background:${d.hex}"></div></div>
  </div>`).join('') }</div>`;
}

/* ════════════════════════════  ASSET CLASS PAGE  ════════════════════════════ */
function renderClass(id){
  const c = classById(id);
  const list = listFor(id);
  const tot = totalFor(id);
  const grand = grandTotal();
  const avg = list.length ? tot/list.length : 0;

  let kpis = `<div class="kpis">
    ${kpi('Total WRS Value', fmtCompact(tot), c.name, c.hex)}
    ${kpi('Managers', String(list.length), 'In this asset class', '#16a34a')}
    ${kpi('Avg per Manager', list.length?fmtCompact(avg):'—', 'Mean WRS value', '#9333ea')}
    ${kpi('% of Portfolio', grand>0?pct(tot,grand).toFixed(1)+'%':'—', 'Share of total WRS', '#ea580c')}
  </div>`;

  let head = `<div class="card">
    <div class="hd">
      <h2>${esc(c.name)} — Managers</h2>
      <div class="spacer"></div>
      <button class="btn primary" onclick="openModal('${id}')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Manager
      </button>
    </div>`;

  let body;
  if(list.length){
    const rows = list.slice().sort((a,b)=>(Number(b.net)||0)-(Number(a.net)||0)).map(m => `<tr>
      <td><div class="mgr">${esc(m.manager)}</div></td>
      <td class="num net">${fmtM(m.net)}</td>
      <td class="num" style="color:var(--muted)">${pct(Number(m.net)||0,tot).toFixed(1)}%</td>
      <td class="num"><div class="row-act">
        <button class="icobtn" title="Edit" onclick="openModal('${id}','${m.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
        <button class="icobtn danger" title="Delete" onclick="deleteManager('${id}','${m.id}')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>
      </div></td>
    </tr>`).join('');
    body = `<table>
      <thead><tr><th>Manager</th><th class="num">Current WRS Value</th><th class="num">% of Class</th><th class="num" style="width:90px"></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }else{
    body = `<div class="empty">
      <div class="ei">${ICONS[id]}</div>
      <h3>No managers in ${esc(c.name)} yet</h3>
      <p>Add your first manager to start tracking this asset class.</p>
      <button class="btn primary" onclick="openModal('${id}')">+ Add Manager</button>
    </div>`;
  }
  return kpis + head + body + `</div>`;
}

/* ════════════════════════════  MODAL  ════════════════════════════ */
function openModal(classId, id){
  editing = { classId, id: id||null };
  const c = classById(classId);
  const isEdit = !!id;
  const m = isEdit ? listFor(classId).find(x=>x.id===id) : null;
  document.getElementById('modalEye').textContent = isEdit ? 'Edit manager' : 'Add manager';
  document.getElementById('modalTitle').textContent = isEdit ? 'Edit Manager' : 'Add Manager';
  document.getElementById('modalSub').textContent = c.name;
  document.getElementById('modalSave').textContent = isEdit ? 'Save Changes' : 'Add Manager';
  document.getElementById('in_manager').value = m ? m.manager : '';
  document.getElementById('in_net').value = m ? (Number(m.net||0)/1e6).toLocaleString('en-US',{maximumFractionDigits:2}) : '';
  ['f_manager','f_net'].forEach(f=>document.getElementById(f).classList.remove('invalid'));
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('in_manager').focus(), 40);
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); editing={classId:null,id:null}; }

function parseMoney(v){
  const n = parseFloat(String(v).replace(/[^0-9.\-]/g,''));
  return isNaN(n) ? null : n;
}
function submitModal(e){
  e.preventDefault();
  const manager = document.getElementById('in_manager').value.trim();
  const millions = parseMoney(document.getElementById('in_net').value); // entered in $ millions
  let ok = true;
  toggleInvalid('f_manager', !manager); if(!manager) ok=false;
  toggleInvalid('f_net', millions===null); if(millions===null) ok=false;
  if(!ok) return;
  const net = Math.round(millions * 1e6); // store full dollars

  const { classId, id } = editing;
  if(id){
    const m = listFor(classId).find(x=>x.id===id);
    if(m){ m.manager=manager; m.net=net; }
    toast(`Updated ${manager}`);
  }else{
    state.managers[classId].push({ id:uid(), manager, net });
    toast(`Added ${manager}`);
  }
  saveState(); closeModal();
  go(currentPage); // refresh current view (modal opens from class pages)
}
function toggleInvalid(fieldId, bad){ document.getElementById(fieldId).classList.toggle('invalid', bad); }

function deleteManager(classId, id){
  const m = listFor(classId).find(x=>x.id===id);
  if(!m) return;
  if(!confirm(`Remove “${m.manager}” from ${classById(classId).name}?`)) return;
  state.managers[classId] = listFor(classId).filter(x=>x.id!==id);
  saveState(); toast(`Removed ${m.manager}`); go(currentPage);
}

/* live-format the money input with thousands separators (allows a leading minus) */
document.addEventListener('input', e=>{
  if(e.target && e.target.id==='in_net'){
    const neg = /^\s*-/.test(e.target.value);   // preserve a leading negative sign
    const raw = e.target.value.replace(/[^0-9.]/g,'');
    if(raw==='') { e.target.value = neg ? '-' : ''; return; }
    const parts = raw.split('.');
    let intp = parts[0].replace(/^0+(?=\d)/,'');
    let out = Number(intp||'0').toLocaleString('en-US');
    if(parts.length>1) out += '.' + parts[1].slice(0,2);
    e.target.value = (neg ? '-' : '') + out;
  }
});

/* ════════════════════════════  DATA IMPORT / EXPORT  ════════════════════════════ */
function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wrs_portfolio_data.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('Exported data');
}
function importData(ev){
  importFromFile(ev.target.files[0]);
  ev.target.value=''; // allow re-importing the same file name
}
function importFromFile(file){
  if(!file) return;
  const looksJson = /\.json$/i.test(file.name||'') || (file.type||'').indexOf('json')!==-1;
  if(!looksJson){ alert('Please choose a .json file exported from this dashboard.'); return; }
  if(totalManagers() > 0 && !confirm(`Importing will replace your current data (${totalManagers()} managers). Continue?`)) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const s = JSON.parse(reader.result);
      const base = blankState();
      if(s && s.managers){ ASSET_CLASSES.forEach(c => { if(Array.isArray(s.managers[c.id])) base.managers[c.id]=s.managers[c.id]; }); }
      state = base; saveState(); go(currentPage); toast('Imported data');
    }catch(err){ alert('Could not read that file — expected JSON exported from this dashboard.'); }
  };
  reader.readAsText(file);
}

/* close modal on overlay click / Esc */
document.getElementById('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

/* ── Drag & drop import (drop a .json anywhere on the window) ── */
let dragDepth = 0;
function dragHasFiles(e){ return e.dataTransfer && Array.from(e.dataTransfer.types||[]).indexOf('Files') !== -1; }
function showDrop(on){ document.getElementById('dropzone').classList.toggle('show', on); }
window.addEventListener('dragenter', e=>{
  if(!dragHasFiles(e)) return;
  e.preventDefault(); dragDepth++; showDrop(true);
});
window.addEventListener('dragover', e=>{
  if(!dragHasFiles(e)) return;
  e.preventDefault(); if(e.dataTransfer) e.dataTransfer.dropEffect='copy';
});
window.addEventListener('dragleave', e=>{
  if(!dragHasFiles(e)) return;
  dragDepth = Math.max(0, dragDepth-1);
  if(dragDepth===0) showDrop(false);
});
window.addEventListener('drop', e=>{
  e.preventDefault(); dragDepth = 0; showDrop(false); // always prevent the browser from opening the file
  const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  if(file) importFromFile(file);
});

/* ════════════════════════════  TOAST  ════════════════════════════ */
let toastTimer;
function toast(msg){
  document.getElementById('toastMsg').textContent = msg;
  const t = document.getElementById('toast'); t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ════════════════════════════  INIT  ════════════════════════════ */
function fmtDate(){
  try{ return new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}); }
  catch(e){ return ''; }
}
document.getElementById('todayDate').textContent = fmtDate();
renderNav(); renderFootMeta(); go('overview');
</script>
